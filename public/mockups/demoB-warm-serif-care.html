<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>받을지도 데모 B — Warm Serif Care</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@700;800&display=swap" rel="stylesheet" />
<style>
  /* 데모 B — Warm Serif Care: 따뜻한 아이보리 + 우아한 명조 + 원형 인물 마스크 (August Health 톤) */
  :root{
    --bg:#fdfaf5; --paper:#fff; --ink:#2a2620; --body:#5d574d; --muted:#9a9388; --line:#ece5da;
    --blue:#2f7ad6; --green:#3a9e74; --coral:#ef7d63; --plum:#8a5bbf;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--body);font-family:"Pretendard",system-ui,sans-serif;letter-spacing:-.012em;line-height:1.6;}
  .serif{font-family:"Nanum Myeongjo",serif;letter-spacing:-.01em;}
  nav{position:sticky;top:18px;z-index:5;max-width:880px;margin:18px auto 0;background:rgba(255,255,255,.8);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:999px;display:flex;align-items:center;justify-content:space-between;padding:10px 12px 10px 22px;box-shadow:0 8px 24px rgba(42,38,32,.06);}
  .brand{font-weight:800;font-size:19px;color:var(--ink);}
  .nav-cta{background:var(--ink);color:#fff;border:none;border-radius:999px;padding:9px 18px;font:inherit;font-weight:700;font-size:13.5px;cursor:pointer;}
  .hero{max-width:780px;margin:0 auto;padding:46px 24px 80px;text-align:center;position:relative;}
  /* 떠 있는 원형 인물 */
  .orb{position:absolute;border-radius:50%;object-fit:cover;box-shadow:0 16px 36px rgba(42,38,32,.14);background:#e9e3da;}
  .orb.a{width:96px;height:96px;top:40px;left:0;}
  .orb.b{width:72px;height:72px;top:150px;right:6px;}
  .orb.c{width:64px;height:64px;bottom:120px;left:30px;}
  .ring{position:absolute;border-radius:50%;}
  .ring.x{width:40px;height:40px;background:#fbe6df;top:120px;left:120px;}
  .ring.y{width:28px;height:28px;background:#e3f1ea;top:90px;right:120px;}
  .eyebrow{display:inline-block;background:#fff;border:1px solid var(--line);color:var(--plum);font-weight:700;font-size:12.5px;padding:7px 15px;border-radius:999px;margin-bottom:22px;}
  h1{font-size:52px;line-height:1.16;color:var(--ink);font-weight:800;margin:0 0 18px;}
  .sub{font-size:17px;color:var(--body);max-width:520px;margin:0 auto 28px;}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:24px;padding:20px;box-shadow:0 20px 50px rgba(42,38,32,.08);max-width:560px;margin:0 auto;text-align:left;}
  textarea{width:100%;border:1px solid var(--line);border-radius:16px;padding:15px;font:inherit;font-size:15.5px;color:var(--ink);resize:none;min-height:96px;outline:none;background:#fdfbf8;}
  textarea:focus{border-color:var(--plum);}
  .row{display:flex;gap:8px;margin-top:14px;align-items:center;}
  .chips{display:flex;gap:8px;flex-wrap:wrap;flex:1;}
  .chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 13px;font-size:12.5px;font-weight:600;color:var(--body);cursor:pointer;}
  .cta{background:var(--blue);color:#fff;border:none;border-radius:999px;padding:13px 22px;font:inherit;font-weight:700;font-size:15px;cursor:pointer;white-space:nowrap;box-shadow:0 8px 18px rgba(47,122,214,.28);}
  .trust{margin-top:22px;font-size:13px;color:var(--muted);}
  @media(max-width:820px){h1{font-size:38px;}.orb,.ring{display:none;}}
</style>
</head>
<body>
  <nav><div class="brand">받을지도</div><button class="nav-cta">시작하기</button></nav>
  <section class="hero">
    <img class="orb a" src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=300&q=80&auto=format&fit=crop" onerror="this.style.display='none'"/>
    <img class="orb b" src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=300&q=80&auto=format&fit=crop" onerror="this.style.display='none'"/>
    <img class="orb c" src="https://images.unsplash.com/photo-1521119989659-a83eee488004?w=300&q=80&auto=format&fit=crop" onerror="this.style.display='none'"/>
    <span class="ring x"></span><span class="ring y"></span>
    <span class="eyebrow">복지 길찾기 · AI 코파일럿</span>
    <h1 class="serif">받을 수 있는지,<br/>같이 찾아봐요</h1>
    <p class="sub">제도명을 몰라도 괜찮아요. 지금 상황을 편하게 적어주시면, 받을 가능성이 있는 복지서비스를 찾아 신청 준비까지 다정하게 함께할게요.</p>
    <div class="card">
      <textarea>서울에 사는 33세 프리랜서입니다. 최근 일이 줄어 월소득이 90만원 수준으로 떨어졌어요. 구직·생계가 막막합니다.</textarea>
      <div class="row">
        <div class="chips"><span class="chip">예시 입력</span><span class="chip">8살 딸 미혼모</span></div>
        <button class="cta">받을지도 찾기 →</button>
      </div>
    </div>
    <p class="trust">입력하신 상황은 저장하지 않습니다 · 민감정보는 입력하지 마세요</p>
  </section>
</body>
</html>
