<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>받을지도 데모 A — Refined Lavender</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  /* 데모 A — Refined Lavender: 절제된 라벤더 에디토리얼 + 사람 사진 + 플로팅 미니카드 */
  :root{
    --bg:#ffffff; --wash:#f3f0fe; --ink:#1d1b32; --body:#56536e; --muted:#8e8aa3;
    --violet:#6d5efc; --violet-soft:#efeafe; --line:#eae6f6; --berry:#e8447f;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--body);font-family:"Pretendard",system-ui,sans-serif;letter-spacing:-.014em;line-height:1.55;}
  nav{display:flex;align-items:center;justify-content:space-between;max-width:1180px;margin:0 auto;padding:22px 28px;}
  .brand{font-weight:800;font-size:20px;color:var(--ink);letter-spacing:-.03em;}
  .brand b{color:var(--violet);}
  .nav-links{display:flex;gap:26px;align-items:center;font-size:14px;font-weight:600;color:var(--body);}
  .nav-cta{background:var(--ink);color:#fff;border:none;border-radius:12px;padding:10px 18px;font:inherit;font-weight:700;font-size:14px;cursor:pointer;}
  .hero{max-width:1180px;margin:0 auto;padding:30px 28px 70px;display:grid;grid-template-columns:1.02fr .98fr;gap:56px;align-items:center;}
  .eyebrow{display:inline-flex;align-items:center;gap:7px;background:var(--violet-soft);color:var(--violet);font-weight:700;font-size:12.5px;padding:7px 14px;border-radius:999px;margin-bottom:20px;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--violet);}
  h1{font-size:54px;line-height:1.08;letter-spacing:-.04em;color:var(--ink);font-weight:800;margin:0 0 18px;}
  .sub{font-size:17px;color:var(--body);max-width:460px;margin:0 0 26px;}
  .field{background:#fff;border:1px solid var(--line);border-radius:18px;padding:8px 8px 8px 18px;display:flex;gap:10px;align-items:flex-end;box-shadow:0 12px 40px rgba(109,94,252,.10);}
  textarea{flex:1;border:none;outline:none;resize:none;font:inherit;font-size:15.5px;color:var(--ink);min-height:76px;padding:12px 0;background:transparent;}
  .send{background:var(--violet);color:#fff;border:none;border-radius:13px;padding:13px 20px;font:inherit;font-weight:700;font-size:15px;cursor:pointer;white-space:nowrap;align-self:stretch;}
  .ex{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;}
  .chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 14px;font-size:13px;font-weight:600;color:var(--body);cursor:pointer;}
  .trust{margin-top:26px;font-size:13px;color:var(--muted);}
  /* 우측 비주얼 */
  .visual{position:relative;}
  .photo{width:100%;height:480px;border-radius:28px;object-fit:cover;background:linear-gradient(150deg,#e9e3ff,#fbe4ef);box-shadow:0 30px 70px rgba(40,30,80,.16);}
  .float{position:absolute;background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:0 16px 40px rgba(40,30,80,.16);padding:14px 16px;}
  .float.one{top:34px;left:-26px;width:230px;}
  .float.two{bottom:30px;right:-22px;width:250px;}
  .f-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .rank{width:24px;height:24px;border-radius:8px;background:var(--violet);color:#fff;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;}
  .f-name{font-weight:800;font-size:14px;color:var(--ink);}
  .f-sub{font-size:12px;color:var(--muted);margin-bottom:8px;}
  .pill{display:inline-block;background:#e7f7f0;color:#1f9d6b;font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:999px;}
  .pill.b{background:var(--violet-soft);color:var(--violet);}
  @media(max-width:920px){.hero{grid-template-columns:1fr;gap:32px;}h1{font-size:40px;}.photo{height:340px;}.nav-links{display:none;}.float{display:none;}}
</style>
</head>
<body>
  <nav>
    <div class="brand">받<b>을</b>지도</div>
    <div class="nav-links"><span>서비스 소개</span><span>이용 방법</span><button class="nav-cta">시작하기</button></div>
  </nav>
  <section class="hero">
    <div>
      <span class="eyebrow"><span class="dot"></span>복지 길찾기 · AI 코파일럿</span>
      <h1>받을 수 있는지,<br/>같이 찾아봐요.</h1>
      <p class="sub">제도명을 몰라도 괜찮아요. 지금 상황을 적어주시면, 받을 가능성이 있는 복지서비스를 AI가 찾아 신청 준비까지 안내합니다.</p>
      <div class="field">
        <textarea>서울에 사는 33세 프리랜서입니다. 최근 일이 줄어 월소득이 90만원 수준으로 떨어졌어요. 구직·생계가 막막합니다.</textarea>
        <button class="send">찾기 →</button>
      </div>
      <div class="ex"><span class="chip">예시 입력</span><span class="chip">8살 딸 미혼모</span><span class="chip">65세 어르신</span></div>
      <p class="trust">입력하신 상황은 저장하지 않습니다 · 민감정보는 입력하지 마세요</p>
    </div>
    <div class="visual">
      <img class="photo" src="/people/ko-hero-woman.png" alt="상담받는 시민" onerror="this.style.visibility='hidden'"/>
      <div class="float one">
        <div class="f-top"><span class="rank">1</span><span class="f-name">국민취업지원제도</span></div>
        <div class="f-sub">고용노동부</div>
        <span class="pill">지원 가능성 · 높음</span>
      </div>
      <div class="float two">
        <div class="f-top"><span class="rank" style="background:#e8447f">2</span><span class="f-name">긴급복지지원</span></div>
        <div class="f-sub">보건복지부 · 생계비 신속 지원</div>
        <span class="pill b">신청 준비 완료까지</span>
      </div>
    </div>
  </section>
</body>
</html>
