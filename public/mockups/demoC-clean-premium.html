<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>받을지도 데모 C — Clean Premium</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  /* 데모 C — Clean Premium: 미니멀 럭셔리, near-white + 단일 딥 액센트(틸) + 사람 사진 클린 프레임 (Linear/Apple 톤) */
  :root{
    --bg:#fbfbfa; --paper:#fff; --ink:#15171a; --body:#54585e; --muted:#9aa0a6; --line:#eceae6;
    --teal:#0e7c6b; --teal-soft:#e6f3f0;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--body);font-family:"Pretendard",system-ui,sans-serif;letter-spacing:-.015em;line-height:1.55;}
  nav{max-width:1160px;margin:0 auto;padding:22px 28px;display:flex;align-items:center;justify-content:space-between;}
  .brand{font-weight:800;font-size:19px;color:var(--ink);letter-spacing:-.03em;}
  .nav-links{display:flex;gap:24px;align-items:center;font-size:14px;font-weight:600;color:var(--body);}
  .nav-cta{background:var(--ink);color:#fff;border:none;border-radius:10px;padding:10px 18px;font:inherit;font-weight:600;font-size:14px;cursor:pointer;}
  .hero{max-width:1160px;margin:0 auto;padding:46px 28px 40px;text-align:center;}
  .eyebrow{display:inline-block;color:var(--teal);background:var(--teal-soft);font-weight:700;font-size:12.5px;padding:6px 13px;border-radius:8px;letter-spacing:.02em;margin-bottom:24px;}
  h1{font-size:60px;line-height:1.06;letter-spacing:-.045em;color:var(--ink);font-weight:800;margin:0 0 20px;}
  .sub{font-size:18px;color:var(--body);max-width:560px;margin:0 auto 30px;}
  .field{max-width:600px;margin:0 auto;background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 10px 36px rgba(20,23,26,.06);padding:8px 8px 8px 18px;display:flex;align-items:flex-end;gap:10px;}
  textarea{flex:1;border:none;outline:none;resize:none;font:inherit;font-size:15.5px;color:var(--ink);min-height:64px;padding:12px 0;background:transparent;text-align:left;}
  .send{background:var(--teal);color:#fff;border:none;border-radius:11px;padding:13px 20px;font:inherit;font-weight:700;font-size:15px;cursor:pointer;white-space:nowrap;}
  .ex{display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap;}
  .chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 14px;font-size:13px;font-weight:600;color:var(--body);cursor:pointer;}
  /* 하단 풀폭 사람 사진 밴드 */
  .showband{max-width:1160px;margin:44px auto 0;padding:0 28px;}
  .frame{position:relative;border-radius:24px;overflow:hidden;height:300px;background:linear-gradient(120deg,#dfeee9,#eef0f2);box-shadow:0 24px 60px rgba(20,23,26,.12);}
  .frame img{width:100%;height:100%;object-fit:cover;}
  .frame .overlay{position:absolute;inset:0;background:linear-gradient(90deg,rgba(15,23,26,.55),rgba(15,23,26,0) 60%);}
  .frame .cap{position:absolute;left:32px;bottom:28px;color:#fff;max-width:420px;}
  .frame .cap b{display:block;font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px;}
  .frame .cap span{font-size:14px;opacity:.9;}
  @media(max-width:860px){h1{font-size:40px;}.nav-links{display:none;}.frame{height:220px;}}
</style>
</head>
<body>
  <nav>
    <div class="brand">받을지도</div>
    <div class="nav-links"><span>서비스 소개</span><span>이용 방법</span><button class="nav-cta">시작하기</button></div>
  </nav>
  <section class="hero">
    <span class="eyebrow">복지 길찾기 · AI 코파일럿</span>
    <h1>받을 수 있는지,<br/>같이 찾아봐요</h1>
    <p class="sub">제도명을 몰라도 괜찮아요. 지금 상황을 적어주시면, 받을 가능성이 있는 복지서비스를 AI가 찾아 신청 준비까지 안내합니다.</p>
    <div class="field">
      <textarea>서울에 사는 33세 프리랜서입니다. 최근 일이 줄어 월소득이 90만원 수준으로 떨어졌어요. 구직·생계가 막막합니다.</textarea>
      <button class="send">찾기 →</button>
    </div>
    <div class="ex"><span class="chip">예시 입력</span><span class="chip">8살 딸 미혼모</span><span class="chip">65세 어르신</span></div>
  </section>
  <div class="showband">
    <div class="frame">
      <img src="https://images.unsplash.com/photo-1521119989659-a83eee488004?w=1300&q=80&auto=format&fit=crop" onerror="this.style.display='none'"/>
      <div class="overlay"></div>
      <div class="cap"><b>복지서비스는 많지만, 몰라서 놓칩니다.</b><span>받을지도는 시민의 상황을 읽어 받을 수 있는 제도를 찾고, 신청 준비까지 데려갑니다.</span></div>
    </div>
  </div>
</body>
</html>
